name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            package_name: No Face No Case-macOS.dmg
            bundle_name: No Face No Case-macOS.zip
            exe_name: ""
          - os: windows-latest
            platform: windows
            package_name: NoFaceNoCase-windows-bundle.zip
            bundle_name: NoFaceNoCase-windows-bundle.zip
            exe_name: No Face No Case.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install project requirements
        run: python -m pip install -r requirements.txt "pyinstaller>=6.0"

      - name: Build macOS app bundle
        if: matrix.platform == 'macos'
        run: python -m PyInstaller --noconfirm --clean --windowed --name "No Face No Case" main.py

      - name: Build Windows folder bundle
        if: matrix.platform == 'windows'
        run: python -m PyInstaller --noconfirm --clean NoFaceNoCase.spec

      - name: Build Windows one-file exe
        if: matrix.platform == 'windows'
        run: python -m PyInstaller --noconfirm --clean NoFaceNoCaseOneFile.spec

      - name: Package macOS bundle
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "No Face No Case.app" "No Face No Case-macOS.zip"
          hdiutil create \
            -volname "No Face No Case" \
            -srcfolder "No Face No Case.app" \
            -ov \
            -format UDZO \
            "No Face No Case-macOS.dmg"

      - name: Package Windows bundle
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/No Face No Case/*" -DestinationPath "dist/NoFaceNoCase-windows-bundle.zip" -Force

      - name: Stage release files
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/No Face No Case.exe" "release/"
          Copy-Item "dist/NoFaceNoCase-windows-bundle.zip" "release/"

      - name: Stage release files
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p release
          cp "dist/No Face No Case-macOS.dmg" "release/"
          cp "dist/No Face No Case-macOS.zip" "release/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
