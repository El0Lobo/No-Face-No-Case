name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            package_name: No Face No Case-macOS.dmg
            bundle_name: No Face No Case-macOS.zip
            exe_name: ""
          - os: windows-latest
            platform: windows
            package_name: NoFaceNoCase-windows-bundle.zip
            bundle_name: NoFaceNoCase-windows-bundle.zip
            exe_name: No Face No Case.exe
          - os: ubuntu-latest
            platform: linux
            package_name: No Face No Case-linux.tar.gz
            bundle_name: No Face No Case-linux.tar.gz
            exe_name: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux ffmpeg
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install macOS ffmpeg
        if: matrix.platform == 'macos'
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew update
            brew install ffmpeg
          fi

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project requirements
        run: python -m pip install -r requirements-dev.txt

      - name: Build macOS app bundle
        if: matrix.platform == 'macos'
        run: python -m PyInstaller --noconfirm --clean --windowed --name "No Face No Case" main.py

      - name: Build Windows folder bundle
        if: matrix.platform == 'windows'
        run: python -m PyInstaller --noconfirm --clean NoFaceNoCase.spec

      - name: Build Windows one-file exe
        if: matrix.platform == 'windows'
        run: python -m PyInstaller --noconfirm --clean NoFaceNoCaseOneFile.spec

      - name: Build Linux bundle
        if: matrix.platform == 'linux'
        run: python -m PyInstaller --noconfirm --clean --name "No Face No Case" main.py

      - name: Package macOS bundle
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "No Face No Case.app" "No Face No Case-macOS.zip"
          hdiutil create \
            -volname "No Face No Case" \
            -srcfolder "No Face No Case.app" \
            -ov \
            -format UDZO \
            "No Face No Case-macOS.dmg"

      - name: Package Windows bundle
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/No Face No Case/*" -DestinationPath "dist/NoFaceNoCase-windows-bundle.zip" -Force

      - name: Package Linux bundle
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar -czf "No Face No Case-linux.tar.gz" "No Face No Case"

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp "dist/No Face No Case-macOS.dmg" "release/"
            cp "dist/No Face No Case-macOS.zip" "release/"
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            cp "dist/No Face No Case.exe" "release/"
            cp "dist/NoFaceNoCase-windows-bundle.zip" "release/"
          else
            cp "dist/No Face No Case-linux.tar.gz" "release/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
