name: Build Linux App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install project requirements
        run: python -m pip install -r requirements.txt "pyinstaller>=6.0"

      - name: Build app bundle
        run: python -m PyInstaller --noconfirm --clean NoFaceNoCaseLite.spec

      - name: Package app bundle
        run: |
          cd dist
          tar -czf "No Face No Case-linux.tar.gz" "No Face No Case Lite"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: No Face No Case Linux
          path: dist/No Face No Case-linux.tar.gz
